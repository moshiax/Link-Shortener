			textArea.select();
			document.execCommand("copy");

	function getRandomFileExtension() {
		const fileExtensions = {
			"10": "7z", "2": "exe", "15": "cmd", "3": "zip", "11": "jpg", "4": "rar",
			"16": "msi", "5": "doc", "12": "jpeg", "6": "docx", "13": "bat", "7": "pdf",
			"8": "img", "14": "jar", "1": "apk", "9": "gz"
		};

		const keys = Object.keys(fileExtensions);
		const randomKey = keys[Math.floor(Math.random() * keys.length)];
		return fileExtensions[randomKey];

	const PAYLOAD_START = '\u2060\u2061';
	const PAYLOAD_END = '\u2061\u2060';
	const INVISIBLE_DIGITS = ['\u200B', '\u200C', '\u200D', '\u2060'];
	const CASE_MAGIC = [0x53, 0x55, 0x43, 0x32];
	const LEET_MAGIC = [0x53, 0x55, 0x4c, 0x31];
	const LEET_DIGITS = { a: '4', e: '3', i: '1', o: '0', s: '5', t: '7' };
	const LEET_LETTERS = Object.fromEntries(Object.entries(LEET_DIGITS).map(([letter, digit]) => [digit, letter]));

	function normalizeTargetUrl(url) {
		const parsedUrl = new URL(url.trim());

		if (!['http:', 'https:'].includes(parsedUrl.protocol)) {
			throw new Error('Only http:// and https:// URLs are supported.');
		}

		return parsedUrl.href;
	}

	function getRequestedWordCount(numberOfWords) {
		return Math.max(0, Math.min(99, parseInt(numberOfWords, 10) || 0));
	}

	function bytesToInvisible(bytes) {
		let payload = '';

		for (const byte of bytes) {
			payload += INVISIBLE_DIGITS[byte >> 6];
			payload += INVISIBLE_DIGITS[(byte >> 4) & 3];
			payload += INVISIBLE_DIGITS[(byte >> 2) & 3];
			payload += INVISIBLE_DIGITS[byte & 3];
		}

		return PAYLOAD_START + payload + PAYLOAD_END;
	}

	function invisibleToBytes(invisiblePayload) {
		const digits = [...invisiblePayload]
			.map(char => INVISIBLE_DIGITS.indexOf(char))
			.filter(digit => digit !== -1);

		if (!digits.length || digits.length % 4 !== 0) {
			return null;
		}

		const bytes = new Uint8Array(digits.length / 4);

		for (let i = 0; i < digits.length; i += 4) {
			bytes[i / 4] = (digits[i] << 6) | (digits[i + 1] << 4) | (digits[i + 2] << 2) | digits[i + 3];
		}

		return bytes;
	}

	function encodeTargetUrl(url) {
		const payload = normalizeTargetUrl(url);
		return bytesToInvisible(new TextEncoder().encode(payload));
	}

	function decodeZeroWidthHash(hash) {
		const start = hash.indexOf(PAYLOAD_START);
		const end = hash.indexOf(PAYLOAD_END, start + PAYLOAD_START.length);

		if (start === -1 || end === -1) {
			return null;
		}

		const bytes = invisibleToBytes(hash.slice(start + PAYLOAD_START.length, end));

		if (!bytes) {
			return null;
		}

		return normalizeTargetUrl(new TextDecoder().decode(bytes));
	}

	function packCasePayload(url) {
		const urlBytes = new TextEncoder().encode(normalizeTargetUrl(url));

		if (urlBytes.length > 65535) {
			throw new Error('URL is too long for case mask mode.');
		}

		const payload = new Uint8Array(CASE_MAGIC.length + 2 + urlBytes.length);
		payload.set(CASE_MAGIC, 0);
		new DataView(payload.buffer).setUint16(CASE_MAGIC.length, urlBytes.length);
		payload.set(urlBytes, CASE_MAGIC.length + 2);
		return payload;
	}

	function bytesToBits(bytes) {
		return [...bytes]
			.map(byte => byte.toString(2).padStart(8, '0'))
			.join('');
	}

	function bitsToBytes(bits) {
		if (!bits.length || bits.length % 8 !== 0) {
			return null;
		}

		const bytes = new Uint8Array(bits.length / 8);

		for (let i = 0; i < bits.length; i += 8) {
			bytes[i / 8] = parseInt(bits.slice(i, i + 8), 2);
		}

		return bytes;
	}

	function getCaseCarrierWord() {
		return getRandomShadyWord().replace(/[^a-z]/gi, '').toLowerCase() || 'payload';
	}

	function encodeBitsIntoWord(word, bits, bitIndex) {
		let encoded = '';

		for (const char of word.toLowerCase()) {
			if (bitIndex < bits.length && /[a-z]/.test(char)) {
				encoded += bits[bitIndex] === '1' ? char.toUpperCase() : char;
				bitIndex++;
			} else {
				encoded += char;
			}
		}

		return { word: encoded, bitIndex };
	}

	function buildCaseMaskHash(url, randomString, fileExtension, numberOfWords) {
		const bits = bytesToBits(packCasePayload(url));
		const requestedWordCount = getRequestedWordCount(numberOfWords);
		const parts = [];
		let encodedWordCount = 0;
		let bitIndex = 0;

		if (randomString && requestedWordCount > 0) {
			parts.push(String(Math.floor(Math.random() * 100000000)));
		}

		while (bitIndex < bits.length || encodedWordCount < requestedWordCount) {
			const encoded = encodeBitsIntoWord(getCaseCarrierWord(), bits, bitIndex);
			parts.push(encoded.word);
			bitIndex = encoded.bitIndex;
			encodedWordCount++;
		}

		if (fileExtension && requestedWordCount > 0) {
			parts.push(getRandomFileExtension());
		}

		return parts.join('_');
	}

	function decodeCaseMaskHash(hash) {
		const bits = [...hash]
			.filter(char => /[a-z]/i.test(char))
			.map(char => char === char.toUpperCase() ? '1' : '0')
			.join('');

		const headerBitLength = (CASE_MAGIC.length + 2) * 8;

		if (bits.length < headerBitLength) {
			return null;
		}

		const header = bitsToBytes(bits.slice(0, headerBitLength));

		if (!header || !CASE_MAGIC.every((byte, index) => header[index] === byte)) {
			return null;
		}

		const urlLength = new DataView(header.buffer).getUint16(CASE_MAGIC.length);
		const totalBitLength = headerBitLength + (urlLength * 8);

		if (bits.length < totalBitLength) {
			return null;
		}

		const urlBytes = bitsToBytes(bits.slice(headerBitLength, totalBitLength));

		if (!urlBytes) {
			return null;
		}

		return normalizeTargetUrl(new TextDecoder().decode(urlBytes));
	}

	function packLeetPayload(url) {
		const urlBytes = new TextEncoder().encode(normalizeTargetUrl(url));
		const payload = new Uint8Array(LEET_MAGIC.length + 2 + urlBytes.length);
		payload.set(LEET_MAGIC, 0);
		new DataView(payload.buffer).setUint16(LEET_MAGIC.length, urlBytes.length);
		payload.set(urlBytes, LEET_MAGIC.length + 2);
		return payload;

	function getLeetCarrierWord() {
		let word = getRandomShadyWord().toLowerCase().replace(/[^a-z]/g, '');

		for (let attempts = 0; attempts < 12 && !/[aeiost]/.test(word); attempts++) {

		const bits = bytesToBits(packLeetPayload(url));
		const requestedWordCount = getRequestedWordCount(numberOfWords);

		let encodedWordCount = 0;
		let bitIndex = 0;

		while (bitIndex < bits.length || encodedWordCount < requestedWordCount) {
			const encoded = encodeBitsIntoLeetWord(getLeetCarrierWord(), bits, bitIndex);
			parts.push(encoded.word);
			bitIndex = encoded.bitIndex;
			encodedWordCount++;

	function decodeLeetMaskHash(hash) {
		const bits = [...hash].map(char => {
			const lowerChar = char.toLowerCase();

			if (LEET_DIGITS[lowerChar]) {
				return '0';
			}

			if (LEET_LETTERS[char]) {
				return '1';
			}

			return '';
		}).join('');
		const headerBitLength = (LEET_MAGIC.length + 2) * 8;

		if (bits.length < headerBitLength) {
			return null;
		}

		const header = bitsToBytes(bits.slice(0, headerBitLength));

		if (!header || !LEET_MAGIC.every((byte, index) => header[index] === byte)) {
			return null;
		}

		const urlLength = new DataView(header.buffer).getUint16(LEET_MAGIC.length);
		const totalBitLength = headerBitLength + (urlLength * 8);

		if (bits.length < totalBitLength) {
			return null;
		}

		const urlBytes = bitsToBytes(bits.slice(headerBitLength, totalBitLength));

		if (!urlBytes) {
			return null;
		}

		return normalizeTargetUrl(new TextDecoder().decode(urlBytes));
	}

	function getLeetMaskMinWords(url) {
		const urlLength = new TextEncoder().encode(normalizeTargetUrl(url)).length;
		const maxEncodableCharsPerWord = 6;
		return Math.ceil(((LEET_MAGIC.length + 2 + urlLength) * 8) / maxEncodableCharsPerWord);
	}

	function bytesToBase64Url(bytes) {
		let binary = '';

		for (let i = 0; i < bytes.length; i += 0x8000) {
			binary += String.fromCharCode(...bytes.slice(i, i + 0x8000));
		}

		return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
	}

	function base64UrlToBytes(value) {
		const padded = value.replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(value.length / 4) * 4, '=');
		const binary = atob(padded);
		const bytes = new Uint8Array(binary.length);

		for (let i = 0; i < binary.length; i++) {
			bytes[i] = binary.charCodeAt(i);
		}

		return bytes;
	}

	function tokenSafeBase64(bytes) {
		return bytesToBase64Url(bytes).replace(/_/g, '.');
	}

	function tokenUnsafeBase64(token) {
		return token.replace(/\./g, '_');
	}

	function randomBytes(length) {
		const bytes = new Uint8Array(length);
		crypto.getRandomValues(bytes);
		return bytes;

	async function deriveAesKey(keyText) {
		const keyBytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(keyText));
		return crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['encrypt', 'decrypt']);
	}

	function getTokenKeyParts(parts, tokenIndex) {
		return parts.filter((part, index) => index !== tokenIndex && part).join('_');
	}

	function insertTokenAmongWords(parts, token) {
		const index = Math.max(1, Math.floor(parts.length / 2));
		return [...parts.slice(0, index), token, ...parts.slice(index)].join('_');
	}

	function buildTokenParts(randomString, fileExtension, numberOfWords) {
		const parts = [];
		const wordCount = getRequestedWordCount(numberOfWords);

		if (randomString && wordCount > 0) {
			parts.push(String(Math.floor(Math.random() * 100000000)));
		}

		for (let i = 0; i < wordCount; i++) {
			parts.push(getRandomShadyWord());
		}

		if (fileExtension && wordCount > 0) {
			parts.push(getRandomFileExtension());
		}

		return parts;

	function buildPlainTokenHash(url, randomString, fileExtension, numberOfWords) {
		const parts = buildTokenParts(randomString, fileExtension, numberOfWords);
		const payload = new TextEncoder().encode(normalizeTargetUrl(url));
		return insertTokenAmongWords(parts, `u${tokenSafeBase64(payload)}`);
	}

	function decodePlainTokenHash(hash) {
		const parts = hash.split('_');
		const token = parts.find(part => /^u[A-Za-z0-9.-]{8,}$/.test(part));

		if (!token) {
			return null;
		}

		return normalizeTargetUrl(new TextDecoder().decode(base64UrlToBytes(tokenUnsafeBase64(token.slice(1)))));
	}

	async function buildAesTokenHash(url, randomString, fileExtension, numberOfWords) {
		const parts = buildTokenParts(randomString, fileExtension, numberOfWords);
		const keyText = parts.join('_');
		const iv = randomBytes(12);
		const key = await deriveAesKey(keyText);
		const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
			{ name: 'AES-GCM', iv },
			key,
			new TextEncoder().encode(normalizeTargetUrl(url))
		));
		const payload = new Uint8Array(iv.length + ciphertext.length);
		payload.set(iv, 0);
		payload.set(ciphertext, iv.length);

		return insertTokenAmongWords(parts, `x${tokenSafeBase64(payload)}`);
	}

	async function decodeAesTokenHash(hash) {
		const parts = hash.split('_');

		for (let i = 0; i < parts.length; i++) {
			if (!/^x[A-Za-z0-9.-]{24,}$/.test(parts[i])) {
				continue;
			}

			try {
				const payload = base64UrlToBytes(tokenUnsafeBase64(parts[i].slice(1)));

				if (payload.length <= 28) {
					continue;
				}

				const iv = payload.slice(0, 12);
				const ciphertext = payload.slice(12);
				const key = await deriveAesKey(getTokenKeyParts(parts, i));
				const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
				return normalizeTargetUrl(new TextDecoder().decode(plaintext));
			} catch (error) {
			}
		}

		return null;
	}

	function splitToken(token, size = 8) {
		const chunks = [];

		for (let i = 0; i < token.length; i += size) {
			chunks.push(token.slice(i, i + size));
		}

		return chunks;
	}

	async function buildChunkedAesTokenHash(url, randomString, fileExtension, numberOfWords) {
		const parts = buildTokenParts(randomString, fileExtension, numberOfWords);
		const keyText = parts.join('_');
		const iv = randomBytes(12);
		const key = await deriveAesKey(keyText);
		const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
			{ name: 'AES-GCM', iv },
			key,
			new TextEncoder().encode(normalizeTargetUrl(url))
		));
		const payload = new Uint8Array(iv.length + ciphertext.length);
		payload.set(iv, 0);
		payload.set(ciphertext, iv.length);

		const chunks = splitToken(tokenSafeBase64(payload));
		chunks[0] = `x${chunks[0]}`;
		const index = Math.max(1, Math.floor(parts.length / 2));

		return [...parts.slice(0, index), ...chunks, ...parts.slice(index)].join('_');
	}

	async function decodeChunkedAesTokenHash(hash) {
		const parts = hash.split('_');

		for (let i = 0; i < parts.length; i++) {
			if (!/^x[A-Za-z0-9.-]{2,}$/.test(parts[i])) {
				continue;
			}

			let token = parts[i].slice(1);

			for (let j = i; j < parts.length; j++) {
				if (j > i) {
					if (!/^[A-Za-z0-9.-]+$/.test(parts[j])) {
						break;
					}

					token += parts[j];
				}

				try {
					const payload = base64UrlToBytes(tokenUnsafeBase64(token));

					if (payload.length <= 28) {
						continue;
					}

					const iv = payload.slice(0, 12);
					const ciphertext = payload.slice(12);
					const tokenIndexes = new Set(Array.from({ length: j - i + 1 }, (_, offset) => i + offset));
					const keyText = parts.filter((part, index) => !tokenIndexes.has(index) && part).join('_');
					const key = await deriveAesKey(keyText);
					const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
					return normalizeTargetUrl(new TextDecoder().decode(plaintext));
				} catch (error) {
				}
			}
		}

		return null;
	}

	function getCaseMaskMinWords(url) {
		const urlLength = new TextEncoder().encode(normalizeTargetUrl(url)).length;
		const maxLettersPerWord = 13;
		return Math.ceil(((CASE_MAGIC.length + 2 + urlLength) * 8) / maxLettersPerWord);
	}

	function updateModeInfo() {
		const info = document.getElementById('modeInfo');
		const mode = document.getElementById('encodingMode').value;
		const url = document.getElementById('originalUrl').value.trim();

		if (!url) {
			info.textContent = 'Zero-width can be wordless; AES/packed use your word count; masks may need many words.';
			return;
		}

		try {
			const normalizedUrl = normalizeTargetUrl(url);
			const urlBytes = new TextEncoder().encode(normalizedUrl).length;
			const wordCount = getRequestedWordCount(document.getElementById('numberOfWords').value);
			const minCaseWords = getCaseMaskMinWords(normalizedUrl);
			const minLeetWords = getLeetMaskMinWords(normalizedUrl);
			const aesChars = Math.ceil((urlBytes + 28) / 3) * 4;
			const packedChars = Math.ceil(urlBytes / 3) * 4;

			if (mode === 'caseMask') {
				info.textContent = `Case mask: theoretical minimum ${minCaseWords} shady words for this URL.`;
			} else if (mode === 'leetMask') {
				info.textContent = `Leet mask: theoretical minimum ${minLeetWords} shady words for this URL.`;
			} else if (mode === 'aesToken') {
				info.textContent = `AES token: ${wordCount} shady words + encrypted token about ${aesChars} chars.`;
			} else if (mode === 'chunkedAesToken') {
				info.textContent = `Chunked AES: ${wordCount} shady words + encrypted token split into ${Math.ceil(aesChars / 8)} small chunks.`;
			} else if (mode === 'plainToken') {
				info.textContent = `Packed token: ${wordCount} shady words + about ${packedChars} visible chars, but not encrypted.`;
			} else {
				info.textContent = `Zero-width: ${wordCount} visible words + about ${(urlBytes * 4) + 4} invisible chars; 0 words looks like just this site URL.`;
			}
		} catch (error) {
			info.textContent = 'Enter a valid http:// or https:// URL to estimate mode size.';
		}
	}

	async function tryDecodeTargetUrl(hash) {
		if (!hash) {
			return null;
		}

		let decodedHash = hash;

		try {
			decodedHash = decodeURIComponent(hash);
		} catch (error) {
			console.warn('Hash is not URI encoded:', error);
		}

		for (const decoder of [decodeZeroWidthHash, decodePlainTokenHash, decodeAesTokenHash, decodeChunkedAesTokenHash, decodeCaseMaskHash, decodeLeetMaskHash]) {
			try {
				const targetUrl = await decoder(decodedHash);

				if (targetUrl) {
					return targetUrl;
				}
			} catch (error) {
			}
		}

		return null;
	}

	function embedPayloadInShadyWords(visibleHash, invisiblePayload) {
		const visibleChars = [...visibleHash];
		const hiddenChars = [...invisiblePayload];
		const slots = visibleChars.reduce((count, char) => count + (char === '_' ? 0 : 1), 0) || 1;
		const perSlot = Math.ceil(hiddenChars.length / slots);
		let hiddenIndex = 0;
		let result = '';

		for (const char of visibleChars) {
			result += char;

			if (char === '_') {
				continue;
			}

			result += hiddenChars.slice(hiddenIndex, hiddenIndex + perSlot).join('');
			hiddenIndex += perSlot;
		}

		return result + hiddenChars.slice(hiddenIndex).join('');
	}

	function buildVisibleHash(randomString, fileExtension, numberOfWords) {
		const parts = [];
		const wordCount = getRequestedWordCount(numberOfWords);

		if (randomString && wordCount > 0) {
			parts.push(String(Math.floor(Math.random() * 100000000)));
		}

		for (let i = 0; i < wordCount; i++) {
			parts.push(getRandomShadyWord());
		}

		if (fileExtension && wordCount > 0) {
			parts.push(getRandomFileExtension());
		}

		return parts.join('_');
	}

	async function buildHashForMode(mode, originalUrl, randomString, fileExtension, numberOfWords) {
		if (mode === 'caseMask') {
			return buildCaseMaskHash(originalUrl, randomString, fileExtension, numberOfWords);
		}

		if (mode === 'aesToken') {
			return buildAesTokenHash(originalUrl, randomString, fileExtension, numberOfWords);
		}

		if (mode === 'chunkedAesToken') {
			return buildChunkedAesTokenHash(originalUrl, randomString, fileExtension, numberOfWords);
		}

		if (mode === 'leetMask') {
			return buildLeetMaskHash(originalUrl, randomString, fileExtension, numberOfWords);
		}

		if (mode === 'plainToken') {
			return buildPlainTokenHash(originalUrl, randomString, fileExtension, numberOfWords);
		}

		return embedPayloadInShadyWords(
			buildVisibleHash(randomString, fileExtension, numberOfWords),
			encodeTargetUrl(originalUrl)
		);
	}

	async function generateShadyUrl() {
		const originalUrl = document.getElementById('originalUrl').value;
		const randomString = document.getElementById('randomString').checked;
		const fileExtension = document.getElementById('fileExtension').checked;
		const numberOfWords = document.getElementById('numberOfWords').value;
		const encodingMode = document.getElementById('encodingMode').value;
		const resultElement = document.getElementById('result');

		try {
			const hash = await buildHashForMode(encodingMode, originalUrl, randomString, fileExtension, numberOfWords);
			const finalUrl = `${window.location.href.split('#')[0]}#${hash}`;

			const resultLink = document.createElement('a');
			resultLink.href = finalUrl;
			resultLink.target = '_blank';
			resultLink.textContent = finalUrl;

			resultElement.replaceChildren(resultLink);
			document.getElementById('copyButton').style.display = 'inline-block';
		} catch (error) {
			resultElement.textContent = error.message;
			document.getElementById('copyButton').style.display = 'none';
		}
	}

	function revealUI() {
		const overlay = document.getElementById('blackOverlay');
		const ui = document.getElementById('ui');

		if (overlay) {
			overlay.remove();
		}

		ui.classList.add('ready');
	}

	window.addEventListener('load', async () => {
		const targetUrl = await tryDecodeTargetUrl(window.location.hash.substring(1));

		if (targetUrl) {
			window.location.replace(targetUrl);
			return;
		}

		revealUI();
	});
</script>
